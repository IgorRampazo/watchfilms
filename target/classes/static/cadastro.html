<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Movie</title>
    <script src="js/cadastroView.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo">Watch Films</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="cadastro.html" class="active">Register</a></li>
            <li><a href="search.html">Search</a></li>
        </ul>
    </div>
</nav>

<section class="form-section">
    <div class="form-card">
        <h2>Movie Registration</h2>

        <form enctype="multipart/form-data">
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="title" name="title" placeholder="Insert the movie title">
            </div>

            <div class="form-group">
                <label>Year</label>
                <input type="number" id="year" name="year" placeholder="Release year">
            </div>

            <div class="form-group">
                <label>Genre</label>
                <select id="genre" name="genre">
                    <option value="">Select genre</option>

                    <option value="Action">Action</option>
                    <option value="Adventure">Adventure</option>
                    <option value="Animation">Animation</option>
                    <option value="Biography">Biography</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Crime">Crime</option>
                    <option value="Drama">Drama</option>
                    <option value="Fantasy">Fantasy</option>
                    <option value="Horror">Horror</option>
                    <option value="Mystery">Mystery</option>
                    <option value="Romance">Romance</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Thriller">Thriller</option>
                    <option value="War">War</option>
                    <option value="Western">Western</option>
                </select>
            </div>

            <div class="form-group">
                <label>Poster</label>
                <input type="file" id="poster" name="poster">
            </div>

            <button type="button" onclick="cadastrarFilmePoster()">Submit</button>
        </form>
    </div>
</section>

</body>
</html>
